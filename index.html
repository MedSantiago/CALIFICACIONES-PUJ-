<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Calificaciones</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-screen">
    <section class="login-card">
      <div class="login-badge">Acceso seguro</div>

      <h1>Iniciar sesión</h1>

      <p class="login-text">
        Entra al sistema de calificaciones con tu correo institucional o tu usuario.
        Este acceso funciona de manera local en el navegador.
      </p>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="username">Correo o usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="ejemplo@javerianacali.edu.co"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="login-options">
          <label class="remember-box">
            <input type="checkbox" id="rememberSession" />
            <span>Recordar sesión</span>
          </label>

          <button type="button" class="demo-btn" id="demoAccess">
            Usar acceso demo
          </button>
        </div>

        <button type="submit" class="login-btn">Entrar al sistema</button>

        <p class="login-help">
          Demo: <strong>admin</strong> | Contraseña: <strong>1234</strong>
        </p>

        <p id="loginMessage" class="login-message"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
